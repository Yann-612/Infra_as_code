# Ce workflow installe Terraform CLI, configure l'authentification avec Terraform Cloud,
# et exécute les commandes Terraform sur GitHub Actions lors des push, pull request ou déclenchement manuel.



name: 'Terraform'      # Nom du workflow affiché dans GitHub Actions

on:
  push:
    branches: ["main"]       # Déclenchement automatique lors d'un push sur la branche main
  pull_request:              # Déclenchement automatique lors d'une pull request
  workflow_dispatch:         # Permet de lancer le workflow manuellement depuis l'interface GitHub

permissions:
  contents: read             # Autorise la lecture du contenu du dépôt (niveau de permission minimal)

jobs:
  terraform:
    name: 'Terraform'        # Nom du job affiché dans GitHub Actions
    runs-on: ubuntu-latest   # Utilise un runner GitHub hébergé sous Ubuntu
    environment: dev         # Définit l'environnement cible (optionnel, utile pour les protections d'environnement)

    defaults:
      run:
        shell: bash          # Utilise bash comme shell par défaut pour toutes les étapes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Récupère tout l'historique Git (utile pour certains plugins ou actions)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }} # Utilise le token Terraform Cloud stocké dans les secrets GitHub
          cli_config_credentials_hostname: app.terraform.io         # Spécifie l'URL de Terraform Cloud
          cli_config_credentials_app.terraform.io_token: ${{ secrets.TF_API_TOKEN }} # Utilise le token Terraform Cloud pour l'authentification
          terraform_version: 1.5.0  # Spécifie la version de Terraform à installer (peut être modifié selon les besoins)
          terraform_working_directory: .github/terraform  # Spécifie le répertoire de travail pour Terraform
          terraform_azure_auth: true  # Active l'authentification Azure pour Terraform
          terraform_azure_auth_client_id: ${{ secrets.AZURE_CLIENT_ID }}  # Utilise le client_id Azure stocké dans les secrets GitHub
          terraform_azure_auth_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}  # Utilise le client_secret Azure stocké dans les secrets GitHub
          terraform_azure_auth_tenant_id: ${{ secrets.AZURE_TENANT_ID }}  # Utilise le tenant_id Azure stocké dans les secrets GitHub
          terraform_azure_auth_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  # Utilise l'ID d'abonnement Azure stocké dans les secrets GitHub
          terraform_azure_auth_environment: AzurePublicCloud  # Spécifie l'environnement Azure (peut être modifié selon les besoins)
      

      - name: Terraform Init
        run: terraform init
        working-directory: .github/terraform  # Lance la commande dans le dossier contenant tes fichiers Terraform

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: .   # Vérifie que les fichiers sont bien formatés (ne modifie rien, échoue si ce n'est pas le cas)

      - name: Terraform Validate
        run: terraform validate
        working-directory: .  # Valide la syntaxe et la cohérence des fichiers Terraform

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars"
        working-directory: .github/terraform   # Génère un plan d'exécution Terraform en utilisant le fichier de variables

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' # N'exécute cette étape que lors d'un push sur main
        run: terraform apply -auto-approve -input=false
        working-directory: .github/terraform
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}   # Passe l'ID d'abonnement Azure depuis les secrets GitHub
          TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}               # Passe le client_id Azure depuis les secrets GitHub
          TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}       # Passe le client_secret Azure depuis les secrets GitHub
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}               # Passe le tenant_id Azure depuis les secrets GitHub

      - name: Generate terraform.tfvars
        run: |
          echo 'resource_group_name = "rg-webserver"' > terraform.tfvars
          echo 'location            = "France Central"' >> terraform.tfvars
          echo 'vm_name             = "srv-web-linux"' >> terraform.tfvars
          echo 'admin_username      = "adminuser"' >> terraform.tfvars
          echo 'prefix              = "webvm"' >> terraform.tfvars
          echo 'ssh_public_key      = "AAAAB3NzaC1yc2EAAAADAQABAAABAQC3v5Z"' >> terraform.tfvars
          echo "client_id           = \"$AZURE_CLIENT_ID\"" >> terraform.tfvars
          echo "client_secret       = \"$AZURE_CLIENT_SECRET\"" >> terraform.tfvars
          echo "tenant_id           = \"$AZURE_TENANT_ID\"" >> terraform.tfvars
          echo "subscription_id     = \"$AZURE_SUBSCRIPTION_ID\"" >> terraform.tfvars
        working-directory: .github/terraform
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          
    # Add any other variables (non-secret) directly, and use secrets for sensitive values

      - name: Debug Terraform Directory
        run: ls -la .github/terraform   # Affiche le contenu du dossier Terraform pour le debug (optionnel)
